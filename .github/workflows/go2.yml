name: Go

on:
  push:
    branches: ["new_workflow"]

env:
  # Заставляет JS-действия запускаться на Node.js 24 вместо устаревшего Node.js 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Build
        run: go build -v ./...

  tests:
    # Задание "tests" зависит от задания "build" и будет выполнено после него
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Test
        run: go test -v ./...